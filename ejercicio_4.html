<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de formulario HTML</title>
</head>
<body>
    <h2>El elemento input y label </h2>
    <label for="fname">First name:</label>
    <input type="text" placeholder="Ingrese su primer nombre" id="fname" planame="fname">
    <br>
    <h2>El elemento select</h2>
    <label for="cars">Escoge una marca carro:</label>
    <select id="cars" name="cars">
    <option value="volvo">Hyundai</option>
    <option value="saab">Toyota</option>
    <option value="fiat">Nissan</option>
    <option value="audi">Chevrolet</option>
    </select>
    <br>
     <h2>Valores visibles</h2>
     <label for="cars">Escoge una marca carro:</label>
<select id="cars" name="cars" size="3">
<option value="volvo">Volvo</option>
<option value="saab">Saab</option>
<option value="fiat">Fiat</option>
<option value="audi">Audi</option>
</select>
<h2>Permitir selecciones múltiples</h2>
<label for="cars">Escoge una marca carro:</label>
<select id="cars" name="cars" size="4" multiple>
<option value="volvo">Volvo</option>
<option value="saab">Saab</option>
<option value="fiat">Fiat</option>
<option value="audi">Audi</option>
</select>
<h2>El elemento textarea</h2>
<textarea name="message" rows="10" cols="30">
The cat was playing in the garden.
</textarea>
<h2>El elemento button</h2>
<button type="button" onclick="alert('Hello World!')">Click
Me!</button>
<h2>Los elementos fieldset y legend</h2>
<form action="/action_page.php">
<fieldset>
<legend>Persona:</legend>
<label for="fname">First name:</label><br>
<input type="text" id="fname" name="fname" value="John"><br>
<label for="lname">Last name:</label><br>
<input type="text" id="lname" name="lname" value="Doe"><br><br>
<input type="submit" value="Submit">
</fieldset>
</form>
<h2>El elemento datalist</h2>
<form action="/action_page.php">
<input list="browsers">
<datalist id="browsers">
<option value="Edge">
<option value="Firefox">
<option value="Chrome">
<option value="Opera">
<option value="Safari">
</datalist>
</form>
<h2>El elemento output</h2>
<form action="/action_page.php"
oninput="x.value=parseInt(a.value)+parseInt(b.value)">
0
<input type="range" id="a" name="a" value="50">
100 +
<input type="number" id="b" name="b" value="50">
=
<output name="x" for="a b"></output>
<br><br>
<input type="submit">
</form>

</body>
</html>
