<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Formularios en HTML</title>
</head>
<body>
<h2>HTML Forms</h2>
<form action="/action_page.php"></form>
<label for="fname">First name:</label><br><br>
<input type="text" id="fname" name="fname" placeholder="Ingrese su primer nombre" value="Cris"><br><br>
<label for="lname">Last name:</label><br><br>
<input type="text" id="lname" name="lname" placeholder="Ingrese su apellido" value="Doe"><br><br>
<input type="submit" value="Submit">
</form>

<p>Si haces clic en el botón "Enviar"</p>
<!--los datos del formulario se enviarán
a una página llamada "/action_page.php-->

<h2>Ejemplo</h2>
<form>
<label for="fname">First name:</label><br>
<input type="text" id="fname" name="fname"><br>
<label for="lname">Last name:</label><br>
<input type="text" id="lname" name="lname">
</form>


</body>
</html>
