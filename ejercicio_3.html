<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atributos de formularios HTML</title>
</head>
<body>
<h2>El atributo de action</h2>
 <form action="/action_page.php">
<label for="fname">First name:</label><br>
<input type="text" id="fname" name="fname" value="John"><br>
<label for="lname">Last name:</label><br>
<input type="text" id="lname" name="lname" value="Doe"><br><br>
<input type="submit" value="Submit">
</form>
<h2>El atributo Target</h2>
<form action="/action_page.php" target="_blank"></form>
<h2>El atributo del Method</h2>
<form action="/action_page.php" method="get"></form>
<form action="/action_page.php" method="post"></form>
<h2>El atributo de Autocomplete</h2>
<form action="/action_page.php" autocomplete="on"></form>
<h2>El atributo Novalidate</h2>
<form action="/action_page.php" novalidate></form>
</body>
</html>
